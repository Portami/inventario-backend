name: Reusable – Build & Push

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    outputs:
      image-tag:
        description: The tag the image was pushed with
        value: ${{ jobs.build-push.outputs.image-tag }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: portami/inventario-backend

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ inputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max