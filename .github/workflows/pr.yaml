name: Pull request workflow
on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/_test.yaml

  sonar:
    needs: test
    uses: ./.github/workflows/_sonar.yaml
    secrets: inherit
    with:
      sonar-version: ${{ needs.test.outputs.sha_short }}-SNAPSHOT

  gate:
    needs: sonar
    runs-on: ubuntu-latest
    environment: staging-approval  # ← this is where the manual gate lives
    steps:
      - run: echo "Approved"

  build-push:
    needs: gate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-push.yaml
    with:
      tag: ${{ needs.test.outputs.sha_short }}

  update-infra:
    needs: build-push
    uses: ./.github/workflows/_update-infra.yaml
    secrets: inherit
    with:
      environment: staging
      tag: ${{ needs.test.outputs.sha_short }}
