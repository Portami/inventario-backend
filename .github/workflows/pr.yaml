name: Pull request workflow
on:
  pull_request:
    branches: [ main ]

jobs:
  get-tag:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.short-commit-hash.outputs.short }}
    steps:
      - name: Get short commit hash
        id: short-commit-hash
        uses: prompt/actions-commit-hash@v3
        with:
          commit: '${{ github.sha }}'

  test:
    permissions:
      contents: read
    uses: ./.github/workflows/_test.yaml

  sonar:
    needs: [test, get-tag]
    uses: ./.github/workflows/_sonar.yaml
    secrets: inherit
    with:
      sonar-version: ${{ needs.get-tag.outputs.sha_short }}-SNAPSHOT

  gate:
    needs: sonar
    runs-on: ubuntu-latest
    environment: staging-approval  # ← this is where the manual gate lives
    steps:
      - run: echo "Approved"

  build-push:
    needs: [gate, get-tag]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-push.yaml
    with:
      tag: ${{ needs.get-tag.outputs.sha_short }}

  update-infra:
    needs: [build-push, get-tag]
    uses: ./.github/workflows/_update-infra.yaml
    secrets: inherit
    with:
      environment: staging
      tag: ${{ needs.get-tag.outputs.sha_short }}
